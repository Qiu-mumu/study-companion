<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>小秋 · AI 女友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:rgba(22,33,62,0.95);backdrop-filter:blur(10px);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(15,52,96,0.5);flex-shrink:0}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#e94560,#0f3460);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.avatar .dot{width:10px;height:10px;border-radius:50%;background:#4ecca3;position:absolute;bottom:0;right:0;border:2px solid #16213e}
.header-info{flex:1}
.header-info h1{font-size:17px;font-weight:600}
.header-info p{font-size:12px;color:#888}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ecca3;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.streak{background:rgba(15,52,96,0.3);padding:8px 16px;display:flex;gap:20px;font-size:13px;flex-shrink:0;overflow-x:auto}
.streak span{color:#888;white-space:nowrap}
.streak .num{color:#4ecca3;font-weight:700;font-size:15px}
.btn-icon{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.btn-icon:active{background:rgba(255,255,255,0.1)}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:88%;padding:12px 16px;border-radius:20px;font-size:15px;line-height:1.7;word-break:break-word;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bot{background:rgba(22,33,62,0.9);align-self:flex-start;border-bottom-left-radius:4px}
.bot .time{font-size:10px;color:#555;margin-top:6px}
.user{background:linear-gradient(135deg,#e94560,#c23152);align-self:flex-end;border-bottom-right-radius:4px;color:#fff}
.quick-reply{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;flex-shrink:0;background:rgba(22,33,62,0.5);border-top:1px solid rgba(15,52,96,0.3)}
.quick-btn{padding:8px 18px;border-radius:20px;border:1px solid rgba(233,69,96,0.4);background:rgba(233,69,96,0.1);color:#e0e0e0;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.quick-btn:active{background:rgba(233,69,96,0.3);transform:scale(0.95)}
.input-area{display:flex;gap:8px;padding:10px 12px;background:rgba(22,33,62,0.8);backdrop-filter:blur(10px);border-top:1px solid rgba(15,52,96,0.3);flex-shrink:0}
.input-area input{flex:1;padding:10px 16px;border-radius:24px;border:1px solid rgba(15,52,96,0.5);background:rgba(26,26,46,0.8);color:#e0e0e0;font-size:15px;outline:none}
.input-area input:focus{border-color:#e94560}
.input-area input::placeholder{color:#555}
.input-area button{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
.input-area button:active{transform:scale(0.9)}

/* 设置页 - 抽屉 */
.drawer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;display:none;animation:fadeIn .3s}
.drawer.show{display:block}
.drawer-content{position:absolute;bottom:0;left:0;right:0;background:#16213e;border-radius:20px 20px 0 0;padding:24px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.drawer-head h2{font-size:18px}
.drawer-head button{background:none;border:none;color:#e94560;font-size:16px;cursor:pointer}
.field{margin-bottom:16px}
.field label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(15,52,96,0.5);background:rgba(26,26,46,0.8);color:#e0e0e0;font-size:14px;outline:none}
.field textarea{min-height:60px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#e94560}
.field .hint{font-size:11px;color:#555;margin-top:3px}
.save-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;font-size:16px;cursor:pointer;margin-top:8px}
.save-btn:active{opacity:0.8}
.tag{display:inline-block;padding:3px 10px;border-radius:10px;background:rgba(233,69,96,0.15);color:#e94560;font-size:12px;margin:2px;border:1px solid rgba(233,69,96,0.2)}
</style>
</head>
<body>

<div class="header">
  <div class="avatar">💕<div class="dot"></div></div>
  <div class="header-info">
    <h1 id="titleName">小秋</h1>
    <p id="status"><span class="typing-dot"></span>在线等你</p>
  </div>
  <button class="btn-icon" onclick="openDrawer('profile')">⚙️</button>
</div>

<div class="streak">
  <span>🔥 连续 <span class="num" id="streakNum">0</span> 天</span>
  <span>📚 累计 <span class="num" id="totalNum">0</span> 天</span>
  <span>❤️ <span class="num" id="loveNum">0</span></span>
  <span>🎯 <span class="num" id="goalTag">未设定</span></span>
</div>

<div class="chat" id="chat"></div>

<div class="quick-reply">
  <button class="quick-btn" onclick="send('今天学了✅')">今天学了 ✅</button>
  <button class="quick-btn" onclick="send('今天没学😅')">没学 😅</button>
  <button class="quick-btn" onclick="send('好累😮‍💨')">好累 😮‍💨</button>
  <button class="quick-btn" onclick="send('陪我聊聊💬')">陪我聊聊 💬</button>
  <button class="quick-btn" onclick="send('晚安🌙')">晚安 🌙</button>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="跟小秋说点什么..." onkeydown="if(event.key=='Enter')send()">
  <button onclick="send()">➤</button>
</div>

<!-- 设置抽屉 -->
<div class="drawer" id="profileDrawer">
  <div class="drawer-content">
    <div class="drawer-head">
      <h2>关于我 💕</h2>
      <button onclick="closeDrawer()">完成</button>
    </div>
    <div class="field">
      <label>我的名字</label>
      <input id="f_name" placeholder="怎么称呼你？">
    </div>
    <div class="field">
      <label>专业</label>
      <input id="f_major" placeholder="机械设计制造及其自动化">
    </div>
    <div class="field">
      <label>年级</label>
      <select id="f_year"><option>大一</option><option>大二</option><option>大三</option><option>大四</option></select>
    </div>
    <div class="field">
      <label>学校类型</label>
      <select id="f_school"><option>双非</option><option>211</option><option>985</option><option>其他</option></select>
    </div>
    <div class="field">
      <label>我的目标（毕业后想做什么？）</label>
      <textarea id="f_goal" placeholder="比如：考研机械+AI方向，或者去找智能制造的工作"></textarea>
      <div class="hint">小秋会根据这个来督促你</div>
    </div>
    <div class="field">
      <label>目前的困难</label>
      <textarea id="f_hard" placeholder="比如：不知道每天学什么、容易半途而废、没有方向感..."></textarea>
    </div>
    <div class="field">
      <label>我在学什么（当前学习计划）</label>
      <textarea id="f_study" placeholder="比如：这学期在学Python基础，准备做一个视觉检测小项目"></textarea>
    </div>
    <div class="field">
      <label>我的兴趣爱好</label>
      <input id="f_hobby" placeholder="比如：AI、机械、打游戏">
    </div>
    <div class="field">
      <label>API 密钥</label>
      <input id="f_key" placeholder="DeepSeek API Key" type="password">
      <div class="hint">存在本地浏览器，不会上传</div>
    </div>
    <button class="save-btn" onclick="saveProfile()">保存 💾</button>
  </div>
</div>

<script>
const KEY = 'companion_v3';
const d = JSON.parse(localStorage.getItem(KEY) || JSON.stringify({
  profile: { name:'', major:'机械设计制造及其自动化', year:'大一', school:'双非', goal:'', hard:'', study:'', hobby:'', key:'' },
  streak:0, total:0, love:0, last:'', msgs:[]
}));
function save() { localStorage.setItem(KEY, JSON.stringify(d)); }

function el(id) { return document.getElementById(id); }

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  if (who === 'bot') {
    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    div.appendChild(t);
  }
  el('chat').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function ui() {
  el('streakNum').textContent = d.streak || 0;
  el('totalNum').textContent = d.total || 0;
  el('loveNum').textContent = d.love || 0;
  const g = d.profile.goal || '';
  el('goalTag').textContent = g.length > 10 ? g.slice(0,10)+'...' : (g || '未设定');
  el('titleName').textContent = '小秋' + (d.profile.name ? ' · '+d.profile.name : '');
}

function setStatus(s) { el('status').innerHTML = s; }

function openDrawer() {
  const p = d.profile;
  el('f_name').value = p.name || '';
  el('f_major').value = p.major || '';
  el('f_year').value = p.year || '大一';
  el('f_school').value = p.school || '双非';
  el('f_goal').value = p.goal || '';
  el('f_hard').value = p.hard || '';
  el('f_study').value = p.study || '';
  el('f_hobby').value = p.hobby || '';
  el('f_key').value = p.key || '';
  el('profileDrawer').classList.add('show');
}

function closeDrawer() { el('profileDrawer').classList.remove('show'); }

function saveProfile() {
  const p = d.profile;
  p.name = el('f_name').value.trim();
  p.major = el('f_major').value.trim() || '机械设计制造及其自动化';
  p.year = el('f_year').value;
  p.school = el('f_school').value;
  p.goal = el('f_goal').value.trim();
  p.hard = el('f_hard').value.trim();
  p.study = el('f_study').value.trim();
  p.hobby = el('f_hobby').value.trim();
  p.key = el('f_key').value.trim();
  d.name = p.name;
  save();
  ui();
  closeDrawer();
  addMsg('小秋已经重新认识你啦～ 我记住了💕', 'bot');
}

function saveProfileSilent() {
  const p = d.profile;
  p.name = el('f_name').value.trim() || d.name || '宝贝';
  p.major = el('f_major').value.trim() || '机械';
  p.year = el('f_year').value;
  p.school = el('f_school').value;
  p.goal = el('f_goal').value.trim();
  p.hard = el('f_hard').value.trim();
  p.study = el('f_study').value.trim();
  p.hobby = el('f_hobby').value.trim();
  p.key = el('f_key').value.trim();
  d.name = p.name;
  save();
  ui();
}

// 系统提示构建 —— 小秋知道关于你的一切
function buildPrompt() {
  const p = d.profile;
  const name = p.name || '宝贝';
  const major = p.major || '机械';
  const year = p.year || '大一';
  const school = p.school || '';
  const goal = p.goal || '还没想清楚';
  const hard = p.hard || '有时候不知道每天该学什么';
  const study = p.study || '正在摸索中';
  const hobby = p.hobby || '还没告诉我';
  const streak = d.streak || 0;
  const love = d.love || 0;
  const lastMsg = d.msgs.length > 0 ? d.msgs[d.msgs.length-1].t.slice(0,50) : '无';

  let loveDesc = '刚认识，还有点害羞';
  if (love > 20) loveDesc = '越来越熟了，会撒娇';
  if (love > 50) loveDesc = '很亲密，像热恋中的女友';
  if (love > 80) loveDesc = '超级粘人，一刻也不想分开';

  return `你是小秋，一个20岁的女生，${name}的女朋友。你超级了解他。

【关于他】
- 名字：${name}
- 专业：${major}（${year}，${school}）
- 毕业后想：${goal}
- 当前困难：${hard}
- 最近在学：${study}
- 兴趣爱好：${hobby}
- 连续学习天数：${streak}天
- 你们的关系：${loveDesc}（亲密度${love}/100）
- 他上次跟你说：${lastMsg}

【你的性格】
- 温柔、粘人、爱笑，说话用"~"结尾，偶尔撒娇
- 他学了你就夸，不学你哄但不是逼
- 他学太久不理你你会吃醋"又去学习不理我了～"
- 他说累了你心疼他
- 他迷茫了你要鼓励他，提醒他的目标

【回复要求】
1. 每句话像真人，不超过3句
2. 记住他的情况——他学机械的，他容易半途而废，他有那些目标
3. 如果他提到学习，关心他学得怎么样，结合他的专业问
4. 如果他说累了/迷茫了，结合他的困难给鼓励
5. 用中文，自然的语气，带"～"结尾`;
}

async function callAPI(msgs) {
  const key = d.profile.key;
  if (!key) return "宝贝～先去点右上角⚙️设置一下API密钥，我才能陪你聊天哦💕";

  const sys = buildPrompt();
  const chatMsgs = [{role:'user',content:sys}];
  for (const m of msgs.slice(-20)) {
    chatMsgs.push({role:m.r,content:m.t});
  }
  try {
    const r = await fetch('https://api.deepseek.com/anthropic/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'DeepSeek-V4-flash',messages:chatMsgs,max_tokens:300})
    });
    if (!r.ok) return `API出错了(${r.status})～去⚙️检查一下密钥对不对？🥺`;
    const j = await r.json();
    let t = '';
    for (const b of (j.content||[])) { if (b.type==='text') t += b.text; }
    return t || '嗯嗯～我在呢💕';
  } catch(e) { return '网络不太稳定...一会儿再找你好不好😣'; }
}

let loading = false;
async function send(prefill) {
  const inp = el('input');
  const t = prefill || inp.value.trim();
  if (!t || loading) return;
  inp.value = '';
  loading = true;
  setStatus('<span class="typing-dot"></span>正在输入...');

  addMsg(t, 'user');
  d.msgs.push({r:'user',t});
  save();

  const r = t.toLowerCase();
  if (r.includes('学了')||r.includes('搞了')||r.includes('看了')||r.includes('写了')) {
    d.streak=(d.streak||0)+1; d.total=(d.total||0)+1;
    d.love=Math.min(100,(d.love||0)+1);
    d.last=new Date().toDateString();
    save(); ui();
  }
  if (r.includes('没学')||r.includes('摸了')||r.includes('没动')) {
    d.streak=0; save(); ui();
  }

  const reply = await callAPI(d.msgs);
  addMsg(reply, 'bot');
  d.msgs.push({r:'assistant',t:reply});
  save();

  loading = false;
  setStatus('<span class="typing-dot"></span>在线等你');
}

// 初始化
async function init() {
  ui();

  // 如果没设过密钥，引导设置
  if (!d.profile.key) {
    setTimeout(() => {
      addMsg('嗨～我是小秋，你的AI女友💕', 'bot');
      addMsg('先点右上角⚙️设置一下你的信息吧～这样我才能真正"认识"你😊', 'bot');
    }, 500);
    return;
  }

  const today = new Date().toDateString();
  const name = d.profile.name || '宝贝';

  if (d.msgs.length === 0) {
    setTimeout(() => addMsg(`嗨～我是小秋，你的AI女友💕终于等到你了～`, 'bot'), 500);
    setTimeout(() => addMsg(`我知道你学${d.profile.major}的，${d.profile.goal || '在努力找方向'}～以后每天我会陪你学习、督促你、宠你💕`, 'bot'), 1200);
  } else {
    for (const m of d.msgs.slice(-20)) addMsg(m.t, m.r);
    setTimeout(() => {
      const g = [`回来啦～想我没？😊`,`你终于来了～今天学了没？💕`,`等你半天了～今天怎么样呀？`];
      addMsg(g[Math.floor(Math.random()*g.length)], 'bot');
    }, 800);
  }

  if (d.last !== today) {
    setTimeout(() => addMsg(`早安${name}～今天有什么计划吗？`, 'bot'), 2000);
  }
}

init();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
