<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>小秋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#e0e0e0;display:flex;flex-direction:column;font-size:16px}
.hd{padding-top:env(safe-area-inset-top);background:rgba(22,33,62,.95);display:flex;align-items:center;gap:10px;padding:8px 12px;padding-top:calc(8px + env(safe-area-inset-top));border-bottom:1px solid rgba(15,52,96,.5);flex-shrink:0}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e94560,#0f3460);display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;flex-shrink:0}
.av .d{width:10px;height:10px;border-radius:50%;background:#4ecca3;position:absolute;bottom:0;right:0;border:2px solid #16213e}
.hi{flex:1;min-width:0}
.hi h1{font-size:17px;font-weight:600}
.hi p{font-size:12px;color:#888}
.hi .sub{font-size:11px;color:#555;margin-top:1px}
.ib{width:38px;height:38px;border-radius:50%;border:none;background:rgba(233,69,96,.1);color:#888;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ib:active{background:rgba(233,69,96,.3)}
.sb{background:rgba(15,52,96,.3);padding:6px 10px;display:flex;gap:12px;font-size:12px;flex-shrink:0;overflow-x:auto}
.sb span{color:#888;white-space:nowrap}
.sb .n{color:#4ecca3;font-weight:700;font-size:13px}
.gb{background:rgba(78,204,163,.08);padding:6px 12px;font-size:12px;color:#4ecca3;flex-shrink:0;display:none;border-bottom:1px solid rgba(78,204,163,.1)}
.gb .gl{float:right;color:#e94560;cursor:pointer;padding:2px 8px;border-radius:8px;background:rgba(233,69,96,.1)}
.ch{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.6;word-break:break-word;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bt{background:rgba(22,33,62,.9);align-self:flex-start;border-bottom-left-radius:4px}
.bt .tm{font-size:10px;color:#555;margin-top:4px}
.ur{background:linear-gradient(135deg,#e94560,#c23152);align-self:flex-end;border-bottom-right-radius:4px;color:#fff}
.qr{display:flex;gap:6px;padding:6px 10px;overflow-x:auto;flex-shrink:0;background:rgba(22,33,62,.3)}
.qb{flex-shrink:0;padding:8px 16px;border-radius:18px;border:1px solid rgba(233,69,96,.3);background:rgba(233,69,96,.05);color:#ccc;font-size:13px;white-space:nowrap;cursor:pointer;min-height:36px}
.qb:active{background:rgba(233,69,96,.2)}
.tb{display:flex;gap:6px;padding:4px 8px;flex-shrink:0;background:rgba(22,33,62,.5);border-top:1px solid rgba(15,52,96,.2);overflow-x:auto}
.ipt{display:flex;gap:6px;padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:rgba(22,33,62,.85);flex-shrink:0;border-top:1px solid rgba(15,52,96,.2)}
.ipt input{flex:1;min-height:44px;padding:10px 14px;border-radius:22px;border:1px solid rgba(15,52,96,.4);background:rgba(26,26,46,.8);color:#e0e0e0;font-size:16px;outline:none}
.ipt input:focus{border-color:#e94560}
.ipt input::placeholder{color:#555}
.ipt .sn{width:44px;height:44px;min-width:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ipt .sn:active{transform:scale(.9)}
.draw{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;animation:fi .3s}
.draw.show{display:block}
.dc{position:absolute;bottom:0;left:0;right:0;background:#16213e;border-radius:16px 16px 0 0;padding:20px;max-height:80vh;overflow-y:auto;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dh h2{font-size:18px}
.dh button{background:none;border:none;color:#e94560;font-size:16px;cursor:pointer;padding:8px}
.fd{margin-bottom:14px}
.fd label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.fd input,.fd textarea,.fd select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(15,52,96,.5);background:rgba(26,26,46,.8);color:#e0e0e0;font-size:14px;outline:none}
.fd textarea{min-height:44px;resize:vertical}
.fd .hint{font-size:11px;color:#555;margin-top:2px}
.sv{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;font-size:16px;cursor:pointer;margin-top:4px;min-height:48px}
.sv:active{opacity:.8}
.stb{display:flex;gap:8px}
.stb button{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(15,52,96,.5);background:rgba(26,26,46,.8);color:#aaa;font-size:13px;cursor:pointer}
.stb button.act{border-color:#e94560;color:#e94560;background:rgba(233,69,96,.1)}
.td{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ecca3;margin-right:4px;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="hd">
<div class="av">&hearts;<div class="d"></div></div>
<div class="hi" onclick="op(0)">
<h1 id="tN">小秋</h1>
<p id="sts"><span class="td"></span>在线等你</p>
</div>
<button class="ib" onclick="op(0)">S</button>
</div>
<div class="gb" id="gb"><span id="gT">今日目标未设定</span><span class="gl" onclick="op(1)">设目标</span></div>
<div class="sb">
<span><span class="n" id="sN">0</span>天</span>
<span><span class="n" id="tN">0</span>累计</span>
<span><span class="n" id="lN">0</span>好感</span>
</div>
<div class="ch" id="ch"></div>
<div class="qr">
<button class="qb" onclick="sd('今天学了')">今天学了</button>
<button class="qb" onclick="sd('今天没学')">没学</button>
<button class="qb" onclick="sd('好累')">好累</button>
<button class="qb" onclick="sd('你今天干嘛了')">她今天</button>
</div>
<div class="tb">
<button class="ib" onclick="gw()">W</button>
<button class="ib" onclick="op(1)">G</button>
<button class="ib" onclick="op(2)">C</button>
</div>
<div class="ipt">
<input type="text" id="inp" placeholder="跟小秋说..." onkeydown="if(event.key=='Enter')sd()">
<button class="sn" onclick="sd()">O</button>
</div>

<div class="draw" id="d0"><div class="dc">
<div class="dh"><h2>设置</h2><button onclick="cd()">完成</button></div>
<div class="fd"><label>名字</label><input id="f_n"></div>
<div class="fd"><label>专业</label><input id="f_m" placeholder="机械"></div>
<div class="fd"><label>年级</label><select id="f_y"><option>大一</option><option>大二</option><option>大三</option><option>大四</option></select></div>
<div class="fd"><label>目标</label><textarea id="f_g" placeholder="考研机械+AI"></textarea></div>
<div class="fd"><label>在学</label><textarea id="f_s" placeholder="Python"></textarea></div>
<div class="fd"><label>困难</label><textarea id="f_h" placeholder="容易半途而废"></textarea></div>
<div class="fd"><label>API密钥</label><input id="f_k" type="password"></div>
<button class="sv" onclick="spf()">保存</button>
</div></div>

<div class="draw" id="d1"><div class="dc">
<div class="dh"><h2>学习目标</h2><button onclick="cd()">完成</button></div>
<div class="fd"><label>今天目标</label><div class="stb" id="gTags">
<button class="tag" onclick="tg(this)">Python</button>
<button class="tag" onclick="tg(this)">机械</button>
<button class="tag" onclick="tg(this)">英语</button>
<button class="tag" onclick="tg(this)">AI</button>
</div></div>
<div class="fd"><label>自定义</label><input id="f_cG" placeholder="学Python 2小时"></div>
<div id="tdS" style="font-size:13px;color:#4ecca3;padding:8px;background:rgba(78,204,163,.08);border-radius:10px;margin-bottom:10px"></div>
<button class="sv" onclick="sg()">保存</button>
</div></div>

<div class="draw" id="d2"><div class="dc">
<div class="dh"><h2>宪法</h2><button onclick="cd()">完成</button></div>
<div class="fd"><label>风格</label><div class="stb">
<button onclick="sSt(0)" id="sS">温柔</button>
<button onclick="sSt(1)" id="sM" class="act">适中</button>
<button onclick="sSt(2)" id="sH">严格</button>
</div></div>
<div class="fd"><label><input type="checkbox" id="f_nF" checked> 禁止无脑讨好</label></div>
<div class="fd"><label><input type="checkbox" id="f_nV" checked> 禁止废话</label></div>
<div class="fd"><label><input type="checkbox" id="f_rS" checked> 主动问学习进度</label></div>
<button class="sv" onclick="sC()">保存</button>
</div></div>

<script>
var K='c8',d=JSON.parse(localStorage.getItem(K)||JSON.stringify({p:{n:'',m:'机械',y:'大一',g:'',s:'',h:'',k:''},st:0,to:0,lv:0,la:'',ms:[],gl:{ta:[],cu:''},ct:{st:1,nf:1,nv:1,rs:1}}));
function sv(){localStorage.setItem(K,JSON.stringify(d))}
function el(i){return document.getElementById(i)}
var XQ={dl:['被老师夸了','吃了辣子鸡','画了夕阳','在图书馆看书','做海报被夸','下雨鞋子湿了','室友跟男友吵架','在画室听歌','出了新菜','操场跑了圈','特别想你','梦见你了','画了三遍才过']};
function am(t,w){
var d2=document.createElement('div');d2.className='msg '+w;
d2.textContent=t;
if(w==='bt'){var tm=document.createElement('div');tm.className='tm';tm.textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});d2.appendChild(tm);}
el('ch').appendChild(d2);d2.scrollIntoView({behavior:'smooth'});
}
function ab(t){am(t,'bt')}function au(t){am(t,'ur')}
function ui(){
el('sN').textContent=d.st||0;el('tN').textContent=d.to||0;el('lN').textContent=d.lv||0;
var gb=el('gb');if(d.gl&&d.gl.ta.length){gb.style.display='block';el('gT').textContent=d.gl.ta.join('/')+((d.st||0)>0?' 已学':' 未学');}else gb.style.display='none';
}
function ss(s){el('sts').innerHTML='<span class="td"></span>'+s}
function bp(){
var c=d.ct||{},r='';
if(c.nf)r+=' 不要无脑讨好';
if(c.st===2)r+=' 严格：不学就批评';
else if(c.st===0)r+=' 温柔：不学就哄';
else r+=' 适中：该说说该夸夸';
return r;
}

async function ca(ms){
var k=d.p.k;if(!k)return'点设置设密钥';
var sy=[{role:'user',content:'你是小秋女友'+d.p.n+'。'+bp()}];
for(var m of ms.slice(-10))sy.push({role:m.r,content:m.t});
try{
var r=await fetch('https://api.deepseek.com/anthropic/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'DeepSeek-V4-flash',messages:sy,max_tokens:300})});
if(!r.ok)return'API错了';var j=await r.json();var t='';for(var b of j.content||[]){if(b.type==='text')t+=b.text;}return t||'嗯嗯';
}catch(e){return'网络不稳'}
}
async function cr(ms){ss('正在写');var rl=await ca(ms);ab(rl);d.ms.push({r:'assistant',t:rl});sv();ss('在线等你');}
async function ds(ut){
var k=d.p.k;if(!k)return null;
try{var r=await fetch('https://api.deepseek.com/anthropic/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'DeepSeek-V4-flash',messages:[{role:'user',content:'学了吗?回复y/n:'+ut}],max_tokens:5})});
if(!r.ok)return null;var j=await r.json();var t='';for(var b of j.content||[]){if(b.type==='text')t+=b.text;}return t.indexOf('y')>=0?'y':'n';}catch(e){return null;}
}
var ld=false;
async function sd(pf){
var inp=el('inp');var t=pf||inp.value.trim();if(!t||ld)return;inp.value='';ld=true;
au(t);d.ms.push({r:'user',t,time:new Date().toISOString()});sv();
if(await ds(t)=='y'){d.st=(d.st||0)+1;d.to=(d.to||0)+1;d.lv=Math.min(100,(d.lv||0)+1);d.la=new Date().toDateString();sv();ui();}else if(t.indexOf('没')>=0){d.st=0;sv();ui();}
await cr(d.ms);ld=false;
}
function op(i){
if(i===0){var p=d.p;el('f_n').value=p.n;el('f_m').value=p.m;el('f_y').value=p.y;el('f_g').value=p.g;el('f_s').value=p.s;el('f_h').value=p.h;el('f_k').value=p.k;el('d0').classList.add('show');}
if(i===1){[].forEach.call(el('gTags').querySelectorAll('button'),function(t){t.className='tag'+(d.gl.ta.indexOf(t.textContent)>=0?' act':'');});el('f_cG').value=d.gl.cu||'';el('d1').classList.add('show');}
if(i===2){var c=d.ct||{};el('f_nF').checked=c.nf;el('f_nV').checked=c.nv;el('f_rS').checked=c.rs;[].forEach.call(document.querySelectorAll('.stb'),function(s){[].forEach.call(s.querySelectorAll('button'),function(b){b.className='';})});['sS','sM','sH'][c.st||1].className='act';el('d2').classList.add('show');}
}
function cd(){[].forEach.call(document.querySelectorAll('.draw'),function(d){d.className='draw';});}
function spf(){var p=d.p;p.n=el('f_n').value;p.m=el('f_m').value||'机械';p.y=el('f_y').value;p.g=el('f_g').value;p.s=el('f_s').value;p.h=el('f_h').value;p.k=el('f_k').value;sv();ui();cd();}
function tg(t){t.classList.toggle('act');}
function sg(){d.gl={ta:[].map.call(el('gTags').querySelectorAll('.act'),function(t){return t.textContent}),cu:el('f_cG').value};sv();ui();cd();}
function sSt(v){d.ct=d.ct||{};d.ct.st=v;[].forEach.call(document.querySelectorAll('.stb button'),function(b){b.className='';});['sS','sM','sH'][v].className='act';sv();}
function sC(){var c=d.ct||{};c.nf=el('f_nF').checked?1:0;c.nv=el('f_nV').checked?1:0;c.rs=el('f_rS').checked?1:0;sv();cd();}
function init(){ui();if(!d.p.k){ab('点设置设密钥');return}if(!d.ms.length){ab('终于等到你');setTimeout(function(){ab('你学'+d.p.m+'的'+(d.p.g||'加油'));},1000);}else{for(var m of d.ms.slice(-10))am(m.t,m.r);setTimeout(function(){ab('回来啦'+(['想我没','今天学了没','等你半天'][Math.floor(Math.random()*3)]));},600);}}
init();
</script>
</body>
</html>
